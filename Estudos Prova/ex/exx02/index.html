<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexSite</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <input type="checkbox" id="theme-toggle" class="toggle-checkbox">
    <input type="checkbox" id="menu-toggle" class="toggle-checkbox" checked> 

    <div class="app-wrapper">
        <header class="header">
            <label for="menu-toggle" class="menu-btn">☰</label>
            
            <h1 class="logo">FlexSite</h1>
            
            <nav class="top-nav">
                <a href="#">Início</a>
                <a href="#">Sobre</a>
                <a href="#">Projetos</a>
                <a href="#">Contato</a>
            </nav>
            
            <label for="theme-toggle" class="theme-btn">🌗</label>
        </header>

        <div class="main-container">
            
            <aside class="sidebar">
                <nav class="side-nav">
                    <a href="#">Início</a>
                    <a href="#">Sobre</a>
                    <a href="#">Projetos</a>
                    <a href="#">Contato</a>
                </nav>
            </aside>

            <main class="content">
                <div class="hero">
                    <h2>Bem-vindo ao FlexSite</h2>
                    <p>Este site agora tem menu escondido e tema escuro com CSS puro 🎨</p>
                </div>

                <div class="cards">
                    <div class="card">Card 1</div>
                    <div class="card">Card 2</div>
                    <div class="card">Card 3</div>
                </div>
            </main>
            
        </div>

        <footer class="footer">
            <p>&copy; 2025 FlexSite. Todos os direitos reservados.</p>
        </footer>
    </div>

</body>
</html>
